<div class="home-page">
  <header class="header">
    <h1>Recipe AI</h1>
    <p>Trang chủ</p>
  </header>
  <div class="cards">
    <div class="card" *ngFor="let item of menuItems">
      <h2>{{ item.title }}</h2>
      <p>{{ item.description }}</p>
      <a [routerLink]="item.route" class="btn">Xem</a>
    </div>
  </div>
</div>
