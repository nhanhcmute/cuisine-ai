<div class="login-form">
  <h1>Đăng nhập</h1>
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="field">
      <label for="username">Username / Email</label>
      <input id="username" type="text" formControlName="username" />
      <span class="error" *ngIf="form.get('username')?.touched && form.get('username')?.errors?.['required']">
        Bắt buộc
      </span>
    </div>
    <div class="field">
      <label for="password">Mật khẩu</label>
      <input id="password" type="password" formControlName="password" />
      <span class="error" *ngIf="form.get('password')?.touched && form.get('password')?.errors?.['required']">
        Bắt buộc
      </span>
    </div>
    <button type="submit" [disabled]="form.invalid">Đăng nhập</button>
  </form>
</div>
